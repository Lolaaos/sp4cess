<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SP4CE Store</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <style>
      :root {
        --primary: #ff3333;
        --bg-black: #080808;
        --text-gray: #a0a0a0;
        --glass: rgba(15, 15, 15, 0.6);
        --glass-border: rgba(255, 255, 255, 0.05);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
      }

      body {
        background: var(--bg-black);
        color: white;
        overflow-x: hidden;
      }

      .bg-animated {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        background: linear-gradient(135deg, #000 0%, #111 50%, #000 100%);
      }

      .gif-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0.03;
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="white" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .glass {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 24px;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
      }

      .btn-primary:hover {
        background: #ff4444;
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(255, 51, 51, 0.3);
      }

      .btn-outline {
        background: transparent;
        color: white;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 12px 24px;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
      }

      .btn-outline:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--primary);
      }

      .form-input {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 12px 16px;
        color: white;
        font-size: 1rem;
        width: 100%;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--primary);
      }

      .nav-scrolled {
        background: rgba(8, 8, 8, 0.95) !important;
        border-bottom: 1px solid var(--glass-border) !important;
      }

      .underline {
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), #ff6666);
        border-radius: 2px;
        margin: 15px auto 0;
      }

      .section-header {
        text-align: center;
        margin-bottom: 60px;
      }

      .section-header h2 {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 900;
        margin-bottom: 10px;
      }

      .section-header p {
        color: var(--text-gray);
        font-size: 1.1rem;
      }

      .hero-buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .nav-brand {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        letter-spacing: 2px;
      }

      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        transition: all 0.3s;
      }

      .nav-links {
        display: flex;
        gap: 40px;
      }

      .nav-user {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .user-info-text {
        display: none;
      }

      .cart-drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: 420px;
        max-width: 100%;
        height: 100vh;
        padding: 40px;
        z-index: 2000;
        overflow-y: auto;
      }

      .product-modal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        align-items: start;
      }

      .admin-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 40px;
        flex-wrap: wrap;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 40px;
      }

      .coupon-form {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 40px;
      }

      @media (max-width: 1024px) {
        .form-grid, .coupon-form {
          grid-template-columns: 1fr;
        }
        .product-modal-grid {
          grid-template-columns: 1fr;
        }
        .nav-links {
          display: none;
        }
        .user-info-text {
          display: none;
        }
      }

      @media (max-width: 768px) {
        .navbar {
          padding: 15px 20px;
          flex-wrap: wrap;
          gap: 20px;
        }
        .hero-buttons {
          flex-direction: column;
          align-items: center;
        }
        .cart-drawer {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
